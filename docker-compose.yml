services:
  web:
    build: .
    command: uvicorn src.web.app:app --host 0.0.0.0 --port 8000
    ports:
      - "127.0.0.1:18000:8000"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped
    environment:
      - TZ=Asia/Tokyo

  app:
    build: .
    command: python run.py
    profiles: ["batch"]
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    environment:
      - TZ=Asia/Tokyo
